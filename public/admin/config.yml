backend:
  name: github
  repo: edumenezes75/theatro-sjbv
  branch: main
  base_url: https://theatrosjbv.vercel.app
  auth_endpoint: api/auth

locale: pt
media_folder: "public/fotos/eventos"
public_folder: "/fotos/eventos"

collections:
  - name: eventos
    label: "Programação / Eventos"
    label_singular: "Evento"
    description: "Agenda de espetáculos, concertos e eventos do Theatro."
    folder: "content/eventos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data e hora", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - { label: "Local", name: "local", widget: "string", required: false, default: "Sala principal — Theatro Municipal" }
      - { label: "Categoria", name: "categoria", widget: "select", options: ["Música", "Dança", "Teatro", "Cinema", "Festival", "Palestra", "Outro"] }
      - { label: "Link de ingressos", name: "ingresso", widget: "string", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["agendado", "realizado"], default: "agendado" }
      - { label: "Destaque na home", name: "destaque", widget: "boolean", default: false, required: false }
      - { label: "Descrição", name: "body", widget: "markdown", required: false }
