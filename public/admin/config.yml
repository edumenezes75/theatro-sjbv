backend:
  name: github
  repo: edumenezes75/theatro-sjbv
  branch: main
  base_url: https://theatrosjbv.vercel.app
  auth_endpoint: api/auth

locale: pt
media_folder: "public/fotos/eventos"
public_folder: "/fotos/eventos"

collections:
  - name: eventos
    label: "Programação / Eventos"
    label_singular: "Evento"
    description: "Agenda de espetáculos, concertos e eventos do Theatro."
    folder: "content/eventos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data e hora", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - { label: "Local", name: "local", widget: "string", required: false, default: "Sala principal — Theatro Municipal" }
      - { label: "Categoria", name: "categoria", widget: "select", options: ["Música", "Dança", "Teatro", "Cinema", "Festival", "Palestra", "Outro"] }
      - { label: "Link de ingressos", name: "ingresso", widget: "string", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["agendado", "realizado"], default: "agendado" }
      - { label: "Destaque na home", name: "destaque", widget: "boolean", default: false, required: false }
      - { label: "Descrição", name: "body", widget: "markdown", required: false }

  - name: pessoas
    label: "Pessoas"
    description: "Personagens da história do Theatro."
    files:
      - name: pessoas
        label: "Lista de pessoas"
        file: "data/pessoas.json"
        fields:
          - label: "Pessoas"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "ex.: p023 (único)" }
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Categoria", name: "category", widget: "string", hint: "fundação, música, restauro, pesquisa, etc." }
              - { label: "Papel", name: "role", widget: "string" }
              - { label: "Resumo", name: "summary", widget: "text" }
              - { label: "Biografia", name: "bio", widget: "markdown", required: false }
              - { label: "Relacionados (IDs)", name: "related", widget: "list", required: false }
              - { label: "Selo", name: "status", widget: "select", options: ["documentado","corroborado","memória","em pesquisa"], default: "documentado" }
              - { label: "Fonte", name: "source", widget: "string", required: false }

  - name: vozes
    label: "Vozes do Theatro"
    description: "Citações de quem viveu o Theatro."
    files:
      - name: vozes
        label: "Lista de vozes"
        file: "data/vozes.json"
        fields:
          - label: "Vozes"
            name: "items"
            widget: "list"
            summary: "{{fields.author}}"
            fields:
              - { label: "Citação", name: "quote", widget: "text" }
              - { label: "Autor", name: "author", widget: "string" }
              - { label: "Papel", name: "role", widget: "string", required: false }
              - { label: "Fonte", name: "source", widget: "string", required: false }

  - name: curiosidades
    label: "Memórias e curiosidades"
    description: "Episódios e curiosidades ('Você sabia?')."
    files:
      - name: curiosidades
        label: "Lista de curiosidades"
        file: "data/curiosidades.json"
        fields:
          - label: "Curiosidades"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "ex.: c015 (único)" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Texto", name: "text", widget: "text" }
              - { label: "Tipo/Selo", name: "type", widget: "string", required: false }
              - { label: "Fonte", name: "source", widget: "string", required: false }
