name: Lighthouse (performance e acessibilidade)
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Rodar Lighthouse na produção
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://www.theatromunicipalsjbv.com.br/
            https://www.theatromunicipalsjbv.com.br/historia
            https://www.theatromunicipalsjbv.com.br/acervo
            https://www.theatromunicipalsjbv.com.br/programacao
          uploadArtifacts: true
          temporaryPublicStorage: true
