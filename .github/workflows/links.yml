name: Verificar links externos
on:
  push:
    branches: [main]
    paths: ['content/**', 'app/**', 'components/**']
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee (links das fontes/markdown)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude '^/' --exclude '^#' --exclude 'mailto:' 'content/**/*.md'
          fail: false
